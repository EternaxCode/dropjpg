name: Release

# Push a tag like v1.1 → builds the DMG and publishes a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swiftc --version

      - name: Build app + DMG
        run: |
          chmod +x build.sh make_dmg.sh scripts/install.command
          ./make_dmg.sh

      - name: Sanity-check version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE="$(cat VERSION)"
          echo "tag=$TAG  VERSION=$FILE"
          if [ "$TAG" != "$FILE" ]; then
            echo "::warning::tag ($TAG) != VERSION file ($FILE)"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "DropJPG ${{ github.ref_name }}"
          files: dist/DropJPG.dmg
          generate_release_notes: true
          body: |
            macOS 메뉴바 이미지→JPG 변환기. / Menu bar image→JPG converter.

            ### 설치 / Install
            1. `DropJPG.dmg` 다운로드 → 열기 → **DropJPG.app** 을 **Applications** 로 드래그.
            2. **최초 1회** (개발자 인증서 없음 → Gatekeeper 차단). 둘 중 하나:
               - DMG 안 **`먼저 실행 - 설치도우미.command`** 더블클릭, 또는
               - 터미널: `xattr -dr com.apple.quarantine /Applications/DropJPG.app`
            3. 실행 → 메뉴바 아이콘 클릭 → 사진 변환.

            ⚠️ Unsigned build — see install step 2.
